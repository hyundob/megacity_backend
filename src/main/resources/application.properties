spring.application.name=
spring.datasource.url=jdbc:postgresql://192.168.0.3:15432/megacitydb
spring.datasource.username=${MEGACITY_DB_USERNAME}
spring.datasource.password=${MEGACITY_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
kma.key=${KMA_KEY}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# Data Sync: Source DB (TBD - leave blank until domain confirmed)
# URL format: jdbc:postgresql://<host>:<port>/<db>?connectTimeout=5&socketTimeout=30
# ============================================================
sync.source.datasource.url=${SYNC_SOURCE_DB_URL:}
sync.source.datasource.username=${SYNC_SOURCE_DB_USERNAME:}
sync.source.datasource.password=${SYNC_SOURCE_DB_PASSWORD:}
sync.source.datasource.connect-timeout-ms=5000
sync.source.datasource.socket-timeout=30

# Sync tuning
sync.batch-size=1000
sync.retry.max-attempts=3
sync.retry.delays-ms=2000,4000,8000

# Lag alert: warn if last successful sync is older than this
sync.lag.alert-threshold-minutes=10