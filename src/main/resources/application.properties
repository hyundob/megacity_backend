spring.application.name=
spring.datasource.url=jdbc:postgresql://192.168.0.3:15432/megacitydb
spring.datasource.username=${MEGACITY_DB_USERNAME}
spring.datasource.password=${MEGACITY_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
kma.key=${KMA_KEY}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# Data Sync: Source DB (TBD - 도메인 확정 후 아래 환경변수로 주입)
# 미설정 시 소스 DataSource 빈이 생성되지 않으며 싱크 잡은 graceful skip 됨.
#
# 설정 방법 (환경변수):
#   SYNC_SOURCE_DATASOURCE_URL=jdbc:postgresql://<host>:<port>/<db>?connectTimeout=5&socketTimeout=30
#   SYNC_SOURCE_DATASOURCE_USERNAME=<user>
#   SYNC_SOURCE_DATASOURCE_PASSWORD=<pass>
#
# 또는 application.properties 직접 설정:
#   sync.source.datasource.url=jdbc:postgresql://...
#   sync.source.datasource.username=...
#   sync.source.datasource.password=...
# ============================================================
sync.source.datasource.connect-timeout-ms=5000
sync.source.datasource.socket-timeout=30

# Sync tuning
sync.batch-size=1000
sync.retry.max-attempts=3
sync.retry.delays-ms=2000,4000,8000

# Lag alert: warn if last successful sync is older than this
sync.lag.alert-threshold-minutes=10